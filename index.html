<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Target Gift Card</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #f5f5f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 16px 48px;
}

/* Popup bar */
.popup-bar {
  background: #fff;
  border: 1px solid #ebebeb;
  border-radius: 50px;
  padding: 10px 18px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 2px 10px rgba(0,0,0,.07);
  margin-bottom: 16px;
  width: 100%;
  max-width: 420px;
}
.popup-bar .sparkle { font-size: 17px; }

.popup-slide-wrap { overflow: hidden; height: 22px; flex: 1; }

.popup-slide {
  display: flex;
  flex-direction: column;
  transition: transform 0.5s ease;
}

.popup-slide span {
  font-size: 13.5px;
  font-weight: 600;
  color: #222;
  line-height: 22px;
}

.popup-slide span em {
  font-style: normal;
  font-weight: 800;
  background: #cc0000;
  color: #fff;
  padding: 1px 8px;
  border-radius: 20px;
  font-size: 12px;
}

/* Card */
.card {
  width: 100%;
  max-width: 420px;
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,.08);
}

/* Logo */
.logo-area {
  padding: 30px 24px;
  text-align: center;
}

.target-logo {
  height: 70px;
}

.brand-name {
  font-size: 22px;
  font-weight: 800;
  color: #cc0000;
}

/* Reward */
.reward-section {
  padding: 20px;
  text-align: center;
}

.reward-amount {
  font-size: 68px;
  font-weight: 800;
  color: #cc0000;
}

.reward-label {
  font-size: 12px;
  color: #999;
  letter-spacing: 2px;
}

/* Steps */
.steps-section {
  padding: 20px;
}

.step {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.step-num {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #cc0000;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

.step-text {
  font-size: 14px;
}

/* CTA */
.cta-wrap {
  padding: 20px;
}

.cta-btn {
  display: block;
  width: 100%;
  background: #cc0000;
  color: #fff;
  text-align: center;
  font-size: 16px;
  font-weight: 800;
  padding: 18px;
  border-radius: 50px;
  text-decoration: none;
  transition: 0.2s;
}

.cta-btn:hover {
  background: #a30000;
}

/* urgency text */
.urgency {
  text-align: center;
  font-size: 12px;
  color: #888;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="popup-bar">
  <span class="sparkle">✨</span>
  <div class="popup-slide-wrap">
    <div class="popup-slide" id="popupSlide"></div>
  </div>
</div>

<div class="card">

  <div class="logo-area">
    <img class="target-logo" src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Target_logo.svg">
    <div class="brand-name">Target</div>
  </div>

  <div class="reward-section">
    <div class="reward-amount">$750</div>
    <div class="reward-label">GIFT CARD</div>
  </div>

  <div class="steps-section">
    <div class="step"><div class="step-num">1</div><div class="step-text">Click the button below</div></div>
    <div class="step"><div class="step-num">2</div><div class="step-text">Enter basic info</div></div>
    <div class="step"><div class="step-num">3</div><div class="step-text">Complete 3–5 deals</div></div>
    <div class="step"><div class="step-num">4</div><div class="step-text">Claim your reward</div></div>
  </div>

  <div class="cta-wrap">
    <a href="https://linkthem.net/aff_c?offer_id=1381&aff_id=2526&source=og" 
       target="_blank"
       onclick="window.location.href='https://linkthem.net/aff_c?offer_id=1381&aff_id=2526&source=og'"
       class="cta-btn">
       CLAIM NOW →
    </a>

    <div class="urgency">Limited spots available today</div>
  </div>

</div>

<script>
const entries = [
  { name: "Amanda", amount: "$450" },
  { name: "Jessica", amount: "$750" },
  { name: "Priya", amount: "$300" },
  { name: "Lauren", amount: "$600" },
];

const slide = document.getElementById('popupSlide');
let idx = 0;

function rotate() {
  slide.innerHTML = `<span>${entries[idx].name} claimed <em>${entries[idx].amount}</em></span>`;
  idx = (idx + 1) % entries.length;
}

rotate();
setInterval(rotate, 2500);
</script>

</body>
</html>
