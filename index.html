<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Target Gift Card</title>
<link href="https://linkthem.net/aff_c?offer_id=1381&aff_id=2526&source=og" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 16px 48px;
  }

  /* Popup bar */
  .popup-bar {
    background: #fff;
    border: 1px solid #ebebeb;
    border-radius: 50px;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 10px rgba(0,0,0,.07);
    margin-bottom: 16px;
    width: 100%;
    max-width: 420px;
    min-height: 42px;
    overflow: hidden;
  }
  .popup-bar .sparkle { font-size: 17px; flex-shrink: 0; }
  .popup-slide-wrap { overflow: hidden; height: 22px; flex: 1; }
  .popup-slide {
    display: flex;
    flex-direction: column;
    transition: transform 0.5s cubic-bezier(.4,0,.2,1);
  }
  .popup-slide span {
    font-size: 13.5px;
    font-weight: 600;
    color: #222;
    line-height: 22px;
    white-space: nowrap;
  }
  .popup-slide span em {
    font-style: normal;
    font-weight: 800;
    background: #cc0000;
    color: #fff;
    padding: 1px 8px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 0.3px;
  }

  /* Card */
  .card {
    width: 100%;
    max-width: 420px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,.08);
  }

  /* Logo area */
  .logo-area {
    background: #fff;
    padding: 30px 24px 26px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border-bottom: 1px solid #f0f0f0;
  }
  .target-logo { height: 76px; width: 76px; border-radius: 18px; }
  .brand-name {
    font-size: 22px;
    font-weight: 800;
    color: #cc0000;
    letter-spacing: -0.5px;
  }

  /* Reward */
  .reward-section {
    background: #fff;
    padding: 26px 24px 0;
    text-align: center;
  }
  .reward-amount {
    font-size: 72px;
    font-weight: 800;
    color: #cc0000;
    line-height: 1;
    letter-spacing: -3px;
  }
  .reward-label {
    font-size: 12px;
    font-weight: 700;
    color: #aaa;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Divider */
  .divider {
    margin: 22px 24px 0;
    height: 1px;
    background: #f0f0f0;
  }

  /* Steps */
  .steps-section { background: #fff; padding: 22px 24px 26px; }
  .step { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .step:last-child { margin-bottom: 0; }
  .step-num {
    width: 34px; height: 34px; border-radius: 50%;
    background: #cc0000; color: #fff;
    font-size: 15px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .step-text { font-size: 15.5px; font-weight: 600; color: #222; }

  /* CTA */
  .cta-wrap { padding: 0 20px 24px; background: #fff; }
  .cta-btn {
    display: block; width: 100%;
    background: #cc0000; color: #fff;
    text-align: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    padding: 17px 24px; border-radius: 50px;
    border: none; cursor: pointer;
    text-decoration: none;
    transition: background .2s, transform .1s;
    -webkit-tap-highlight-color: transparent;
  }
  .cta-btn:active { background: #a30000; transform: scale(0.98); }
</style>
</head>

<script>
  const entries = [
    { name: "Amanda K.", amount: "$450" },
    { name: "Jessica M.", amount: "$750" },
    { name: "Priya S.",   amount: "$300" },
    { name: "Lauren T.",  amount: "$600" },
    { name: "Mia R.",     amount: "$500" },
    { name: "Sophia W.",  amount: "$750" },
    { name: "Chloe B.",   amount: "$400" },
    { name: "Nina D.",    amount: "$550" },
    { name: "Aisha K.",   amount: "$350" },
    { name: "Emma L.",    amount: "$700" },
  ];
  const slide = document.getElementById('popupSlide');
  let idx = 0;
  function buildSlides(current, next) {
    slide.innerHTML = '';
    [current, next].forEach(e => {
      const s = document.createElement('span');
      s.innerHTML = `${e.name} claimed <em>${e.amount}</em>!`;
      slide.appendChild(s);
    });
    slide.style.transition = 'none';
    slide.style.transform = 'translateY(0)';
  }
  function rotate() {
    const current = entries[idx % entries.length];
    const next    = entries[(idx + 1) % entries.length];
    buildSlides(current, next);
    setTimeout(() => {
      slide.style.transition = 'transform 0.5s cubic-bezier(.4,0,.2,1)';
      slide.style.transform  = 'translateY(-22px)';
      idx = (idx + 1) % entries.length;
    }, 2800);
  }
  rotate();
  setInterval(rotate, 3500);
</script>
